question: q3
status: done
objective: "在 200 yd 目标下求解最优击球参数并生成最优三维轨迹"

inputs:
  raw_data:
    - data/raw/problem/附件（实训题2）.xlsx
  processed_data:
    - data/processed/golf_shots_clean.csv
  upstream_artifacts:
    - questions/q2/artifacts/models/q2_carry_model.joblib
    - questions/q2/artifacts/models/q2_apex_model.joblib
    - questions/q2/artifacts/models/q2_ode_parameters.json
    - questions/q2/artifacts/run_metadata.json
    - questions/q2/artifacts/tables/q2_data_split.csv
    - questions/q2/artifacts/tables/q2_validation_checks.csv

entrypoints:
  pipeline: questions/q3/scripts/pipeline.py
  validation: questions/q3/scripts/validate.py
  visualization: questions/q3/scripts/visualize.py

outputs:
  tables: questions/q3/artifacts/tables
  figures: questions/q3/artifacts/figures
  figure_data: questions/q3/artifacts/figure_data
  models: questions/q3/artifacts/models

quality_gates:
  baseline: true
  validation: true
  sensitivity: true
  evidence_chain: true
  reproducible: true
