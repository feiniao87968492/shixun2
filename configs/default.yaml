project:
  title: "2026年实训题2 高尔夫球飞行轨迹预测与最优击球策略建模"
  competition: "课程实训"
  question_count: 3

runtime:
  random_seed: 2026
  float_precision: 8
  fail_on_warning: false

paths:
  raw_data: data/raw
  interim_data: data/interim
  processed_data: data/processed
  external_data: data/external

plot:
  dpi: 300
  save_metadata: true
  require_figure_data: true

validation:
  sensitivity_relative_changes: [-0.20, -0.10, 0.10, 0.20]
  repeated_runs: 30
  confidence_level: 0.95

q1:
  input_path: data/raw/problem/附件（实训题2）.xlsx
  processed_path: data/processed/golf_shots_clean.csv
  output_dir: questions/q1/artifacts
  random_seed: 2026
  invalid_zero_rules:
    club_speed_mph: true
    attack_angle_deg: true
  bootstrap:
    iterations: 1000
    confidence_level: 0.95
  cross_validation:
    folds: 5
    repeats: 5
  ridge:
    alphas: [0.001, 0.01, 0.1, 1, 10, 100]
  permutation_importance:
    repeats: 10
  nonlinear_model:
    name: ExtraTreesRegressor
    n_estimators: 120
    min_samples_leaf: 3
  outlier_analysis:
    lower_quantile: 0.01
    upper_quantile: 0.99
  plotting:
    dpi: 300

q2:
  input_path: data/processed/golf_shots_clean.csv
  output_dir: questions/q2/artifacts
  random_seed: 2026
  split:
    test_size: 0.30
  features:
    launch_state:
      - ball_speed_mph
      - launch_angle_deg
      - launch_direction_deg
      - spin_rate_rpm
      - spin_axis_deg
    full_shot:
      - ball_speed_mph
      - launch_angle_deg
      - launch_direction_deg
      - spin_rate_rpm
      - spin_axis_deg
      - club_speed_mph
      - attack_angle_deg
  targets:
    - carry_distance_yd
    - apex_height_yd
  cross_validation:
    folds: 5
  repeated_split:
    runs: 30
  bootstrap:
    iterations: 1000
    confidence_level: 0.95
  supervised:
    models:
      - dummy
      - linear
      - ridge
      - extra_trees
      - hist_gradient_boosting
  physics:
    mass_kg: 0.0456
    diameter_m: 0.04267
    radius_m: 0.021335
    air_density_kg_m3: 1.225
    gravity_m_s2: 9.80665
    initial_height_m: 0.01
    source: "题面 raw OCR 第 9 行；docs/references.md 物理常数表"
  ode:
    model_variants:
      - vacuum
      - drag
      - constant_lift
      - spin_factor_lift
    solver:
      method: DOP853
      rtol: 1.0e-7
      atol: 1.0e-9
      max_step: 0.02
    parameter_bounds:
      cd: [0.05, 0.60]
      cl: [0.00, 0.45]
      lift_scale: [0.00, 4.00]
    drag_calibration:
      representative_count: 36
      grid_size: 10
      calibration_stage: preliminary_drag_only
    lift_calibration:
      representative_count: 24
      grid_size: 6
      calibration_stage: train_representative_grid
      lateral_weight: 0.02
      solver_max_step: 0.05
    sensitivity_relative_changes:
      - -0.20
      - -0.10
      - 0.10
      - 0.20
  plotting:
    dpi: 300
