project:
  title: "2026年实训题2 高尔夫球飞行轨迹预测与最优击球策略建模"
  competition: "课程实训"
  question_count: 3

runtime:
  random_seed: 2026
  float_precision: 8
  fail_on_warning: false

paths:
  raw_data: data/raw
  interim_data: data/interim
  processed_data: data/processed
  external_data: data/external

plot:
  dpi: 300
  save_metadata: true
  require_figure_data: true

validation:
  sensitivity_relative_changes: [-0.20, -0.10, 0.10, 0.20]
  repeated_runs: 30
  confidence_level: 0.95

q1:
  input_path: data/raw/problem/附件（实训题2）.xlsx
  processed_path: data/processed/golf_shots_clean.csv
  output_dir: questions/q1/artifacts
  random_seed: 2026
  invalid_zero_rules:
    club_speed_mph: true
    attack_angle_deg: true
  bootstrap:
    iterations: 1000
    confidence_level: 0.95
  cross_validation:
    folds: 5
    repeats: 5
  ridge:
    alphas: [0.001, 0.01, 0.1, 1, 10, 100]
  permutation_importance:
    repeats: 10
  nonlinear_model:
    name: ExtraTreesRegressor
    n_estimators: 120
    min_samples_leaf: 3
  outlier_analysis:
    lower_quantile: 0.01
    upper_quantile: 0.99
  plotting:
    dpi: 300
